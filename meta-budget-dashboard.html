    label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; }
    input, select, button {

    }
    button { background: var(--brand); color: #fff; border-color: var(--brand); font-weight: 700; cursor: pointer; }
    .grid { display: grid; gap: 12px; }
    .kpis { grid-template-columns: repeat(6, minmax(0, 1fr)); margin-bottom: 14px; }
    .kpi { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; min-height: 108px; }
    .kpi span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .kpi strong { font-size: 22px; font-variant-numeric: tabular-nums; overflow-wrap: anywhere; }
    .kpi small { display: block; margin-top: 8px; color: var(--muted); line-height: 1.4; }
    .panel { padding: 16px; margin-bottom: 14px; }
    .panel-head { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; margin-bottom: 12px; }
    h2 { margin: 0; font-size: 18px; }
    .note { color: var(--muted); font-size: 13px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 8px; text-align: left; font-size: 13px; vertical-align: top; }
    th { color: #344054; background: #f8fafc; font-weight: 800; position: sticky; top: 0; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .scroll { overflow: auto; max-height: 520px; border: 1px solid var(--line); border-radius: 8px; }
    .good { color: var(--good); font-weight: 800; }
    .warn { color: var(--warn); font-weight: 800; }
    .bad { color: var(--bad); font-weight: 800; }
    .bars { display: grid; gap: 7px; }
    .bar-row { display: grid; grid-template-columns: 96px 1fr 96px; gap: 10px; align-items: center; font-size: 12px; }
    .bar-track { height: 16px; background: #edf1f5; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--brand); min-width: 1px; }
    @media (max-width: 1050px) {
      header { display: block; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }

  <script>
    const data = JSON.parse(document.getElementById('dashboard-data').textContent);
    const daily = data.daily || [];

    const monthly = data.monthly || [];
    const fmtWon = (v) => `${Math.round(Number(v || 0)).toLocaleString('ko-KR')}원`;
    const fmtNum = (v) => Math.round(Number(v || 0)).toLocaleString('ko-KR');
    const fmtPct = (v) => `${(Number(v || 0) * 100).toFixed(1)}%`;
    const byId = (id) => document.getElementById(id);
    const dateKey = (row, mode) => mode === 'weekly' ? row.period_since : mode === 'monthly' ? row.period_since : row.report_date;
    const dateEnd = (row, mode) => mode === 'daily' ? row.report_date : row.period_until;

    function inRange(row, mode, start, end) {
      const s = dateKey(row, mode);
      const e = dateEnd(row, mode);
      return (!start || e >= start) && (!end || s <= end);
    }
    function sum(rows, key) { return rows.reduce((acc, row) => acc + Number(row[key] || 0), 0); }
    function cls(value) { return Number(value || 0) > 0 ? 'good' : Number(value || 0) < 0 ? 'bad' : ''; }
    function renderKpis(rows) {
      const spend = sum(rows, 'meta_api_spend');
      const profitSpend = sum(rows, 'profit_ad_spend');
      const revenue = sum(rows, 'ga4_revenue');

      const coverage = spend ? profitSpend / spend : 0;

        ['순이익 커버 광고비', fmtWon(profitSpend), fmtPct(coverage)],
        ['GA4 매출', fmtWon(revenue), 'DB 검증 rows 기준'],
        ['순이익', fmtWon(profit), `ROI ${fmtPct(roi)}`],
        ['주문수', fmtNum(orders), '광고 귀속 주문'],
        ['순이익 데이터 기간', fmtNum(profitDays), coverage < 0.7 ? '커버리지 보완 필요' : '커버리지 양호'],
      ];
      byId('kpis').innerHTML = cards.map(([label, value, note]) => `
        <div class="kpi"><span>${label}</span><strong>${value}</strong><small>${note}</small></div>
      `).join('');
    }
    function renderStatus(rows, mode) {
      const headers = mode === 'daily'
        ? ['날짜', 'Meta 광고비', '순이익 광고비', 'GA4 매출', '순이익', 'ROI', '커버']
        : ['기간', '일수', '순이익일수', 'Meta 광고비', '순이익 광고비', 'GA4 매출', '순이익', 'ROI', '커버율'];
      const body = rows.map((row) => {
        const roi = Number(row.real_roi_on_profit_spend || 0);
        if (mode === 'daily') {
          return `<tr>
            <td>${row.report_date}</td>
            <td class="num">${fmtWon(row.meta_api_spend)}</td>
            <td class="num">${fmtWon(row.profit_ad_spend)}</td>
            <td class="num">${fmtWon(row.ga4_revenue)}</td>
            <td class="num ${cls(row.net_profit)}">${fmtWon(row.net_profit)}</td>
            <td class="num ${cls(roi)}">${fmtPct(roi)}</td>
            <td>${row.has_profit_data ? '있음' : '미적재'}</td>
          </tr>`;
        }
        return `<tr>
          <td>${row.period_since} ~ ${row.period_until}</td>
          <td class="num">${fmtNum(row.day_count)}</td>
          <td class="num">${fmtNum(row.profit_day_count)}</td>
          <td class="num">${fmtWon(row.meta_api_spend)}</td>
          <td class="num">${fmtWon(row.profit_ad_spend)}</td>
          <td class="num">${fmtWon(row.ga4_revenue)}</td>
          <td class="num ${cls(row.net_profit)}">${fmtWon(row.net_profit)}</td>
          <td class="num ${cls(roi)}">${fmtPct(roi)}</td>
          <td class="num">${fmtPct(row.profit_spend_coverage_rate)}</td>
        </tr>`;
      }).join('');
      byId('statusTable').innerHTML = `<thead><tr>${headers.map((h) => `<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody>`;
    }
    function renderBars(rows) {
      const selectedDaily = daily.filter((row) => rows.some((r) => row.report_date >= dateKey(r, byId('mode').value) && row.report_date <= dateEnd(r, byId('mode').value)));
      const maxSpend = Math.max(...selectedDaily.map((row) => Number(row.meta_api_spend || 0)), 1);
      byId('bars').innerHTML = selectedDaily.map((row) => `
        <div class="bar-row">
          <div>${row.report_date}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(2, Number(row.meta_api_spend || 0) / maxSpend * 100)}%"></div></div>
          <div class="num">${fmtWon(row.meta_api_spend)}</div>
        </div>
      `).join('');
    }
    function renderEntities(start, end) {
      const monthSet = new Set(daily.filter((row) => (!start || row.report_date >= start) && (!end || row.report_date <= end)).map((row) => row.source_month || row.report_date.slice(0, 7) + '-01'));
      const rows = (data.entities || []).filter((row) => !monthSet.size || monthSet.has(row.month_start)).slice(0, 50);
      byId('entityTable').innerHTML = `<thead><tr><th>월</th><th>레벨</th><th>이름</th><th class="num">광고비</th><th class="num">구매</th><th class="num">Meta ROAS</th></tr></thead><tbody>` +
        rows.map((row) => `<tr>
          <td>${row.month_start}</td><td>${row.level}</td>
          <td>${row.adset_name || row.campaign_name || row.ad_name || row.entity_id}</td>
          <td class="num">${fmtWon(row.spend)}</td>
          <td class="num">${fmtNum(row.purchases)}</td>
          <td class="num">${fmtPct(row.roas)}</td>
        </tr>`).join('') + `</tbody>`;
    }
    function renderStrategies() {
      byId('strategyTable').innerHTML = `<thead><tr><th>스냅샷</th><th>기간</th><th class="num">광고비</th><th class="num">커버율</th><th class="num">순이익</th><th class="num">권장 일증액</th><th>상태</th><th>블로커</th></tr></thead><tbody>` +
        (data.strategies || []).map((row) => `<tr>
          <td>${row.snapshot_date}</td><td>${row.period_since} ~ ${row.period_until}</td>
          <td class="num">${fmtWon(row.spend_total)}</td>
          <td class="num">${fmtPct(row.profit_coverage_rate)}</td>
          <td class="num ${cls(row.net_profit)}">${fmtWon(row.net_profit)}</td>
          <td class="num">${fmtWon(row.recommended_daily_increase)}</td>
          <td>${row.execution_status}</td>
          <td>${Array.isArray(row.blockers) ? row.blockers.map((b) => b.code).join(', ') : ''}</td>
        </tr>`).join('') + `</tbody>`;
    }
    function apply() {
      const mode = byId('mode').value;
      const start = byId('startDate').value;
      const end = byId('endDate').value;
      const source = mode === 'weekly' ? weekly : mode === 'monthly' ? monthly : daily;
      const rows = source.filter((row) => inRange(row, mode, start, end));
      byId('rangeNote').textContent = `${start || '처음'} ~ ${end || '마지막'} · ${mode} · ${rows.length} rows`;
      renderKpis(rows);
      renderStatus(rows, mode);
      renderBars(rows);
      renderEntities(start, end);
      renderStrategies();
    }
    function init() {
      if (daily.length) {
        byId('startDate').value = daily[0].report_date;
        byId('endDate').value = daily[daily.length - 1].report_date;
      }
      byId('applyBtn').addEventListener('click', apply);
      byId('latestBtn').addEventListener('click', () => {
        byId('startDate').value = daily[0]?.report_date || '';
        byId('endDate').value = daily[daily.length - 1]?.report_date || '';
        apply();
      });
      byId('mode').addEventListener('change', apply);
      apply();
    }
    init();
  </script>
</body>
</html>
